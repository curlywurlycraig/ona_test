<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bouncing Box</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #1a1a2e; }
  #container {
    width: 600px;
    height: 400px;
    border: 3px solid #e94560;
    position: relative;
    background: #16213e;
    border-radius: 4px;
  }
  #box {
    width: 50px;
    height: 50px;
    background: #e94560;
    position: absolute;
    border-radius: 4px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="box"></div>
</div>
<script>
  const container = document.getElementById('container');
  const box = document.getElementById('box');

  const maxX = container.clientWidth - box.clientWidth;
  const maxY = container.clientHeight - box.clientHeight;

  let x = Math.random() * maxX;
  let y = Math.random() * maxY;
  let dx = 3;
  let dy = 2;

  function animate() {
    x += dx;
    y += dy;

    if (x <= 0 || x >= maxX) dx = -dx;
    if (y <= 0 || y >= maxY) dy = -dy;

    x = Math.max(0, Math.min(x, maxX));
    y = Math.max(0, Math.min(y, maxY));

    box.style.left = x + 'px';
    box.style.top = y + 'px';

    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
